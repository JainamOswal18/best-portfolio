<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Jainam Oswal — terminal portfolio">
  <defs>
    <linearGradient id="titleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131c30"/>
      <stop offset="1" stop-color="#0d1424"/>
    </linearGradient>

    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0F172A"/>
      <stop offset="1"   stop-color="#0a1020"/>
    </linearGradient>

    <radialGradient id="halo" cx="20%" cy="-10%" r="70%">
      <stop offset="0"   stop-color="#22C55E" stop-opacity="0.10"/>
      <stop offset="1"   stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>

    <pattern id="scanlines" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="3" fill="transparent"/>
      <rect width="1" height="1" y="2" fill="#22C55E" fill-opacity="0.025"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style><![CDATA[
    .mono   { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', ui-monospace, monospace; }
    .name   { fill: #F8FAFC; font-weight: 700; letter-spacing: -0.02em; }
    .prompt { fill: #22C55E; }
    .accent { fill: #22C55E; }
    .cyan   { fill: #06B6D4; }
    .muted  { fill: #94A3B8; }
    .dim    { fill: #475569; }
    @keyframes blink { 0%, 50% { opacity: 1 } 50.01%, 100% { opacity: 0 } }
    .caret  { animation: blink 1.06s steps(1, end) infinite; }
  ]]></style>

  <!-- window -->
  <rect x="0.5" y="0.5" width="1199" height="319" rx="10" ry="10"
        fill="url(#bodyGrad)" stroke="#22C55E" stroke-width="1" opacity="1"/>

  <!-- corner halo -->
  <rect x="0.5" y="0.5" width="1199" height="319" rx="10" ry="10" fill="url(#halo)"/>

  <!-- scanline overlay -->
  <rect x="0.5" y="0.5" width="1199" height="319" rx="10" ry="10" fill="url(#scanlines)"/>

  <!-- titlebar -->
  <path d="M 1,11 A 10,10 0 0 1 11,1 L 1189,1 A 10,10 0 0 1 1199,11 L 1199,42 L 1,42 Z"
        fill="url(#titleBar)" stroke="#475569" stroke-width="1"/>

  <!-- traffic lights -->
  <circle cx="22" cy="21" r="6" fill="#EF4444"/>
  <circle cx="42" cy="21" r="6" fill="#F59E0B"/>
  <circle cx="62" cy="21" r="6" fill="#22C55E"/>

  <!-- titlebar text -->
  <text x="600" y="26" class="mono muted" font-size="13" text-anchor="middle" letter-spacing="0.04em">
    jainam@portfolio:~$
  </text>

  <!-- attempt counter chip on right -->
  <rect x="1080" y="11" width="106" height="20" rx="3" fill="#22C55E" fill-opacity="0.10" stroke="#22C55E" stroke-opacity="0.35"/>
  <text x="1133" y="25" class="mono accent" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="0.06em">
    ● LIVE
  </text>

  <!-- body content -->
  <!-- prompt line -->
  <text x="40" y="92" class="mono prompt" font-size="20" filter="url(#softGlow)">❯</text>
  <text x="66" y="92" class="mono" font-size="20" fill="#06B6D4">whoami</text>

  <!-- name -->
  <text x="40" y="170" class="mono name" font-size="72" filter="url(#softGlow)">Jainam Oswal</text>

  <!-- tagline -->
  <text x="40" y="210" class="mono accent" font-size="22" filter="url(#softGlow)">
    Full Stack AI Engineer
    <tspan class="dim"> · </tspan>
    Hackathon Junkie
    <tspan class="dim"> · </tspan>
    Community Builder
  </text>

  <!-- meta -->
  <text x="40" y="244" class="mono muted" font-size="15">
    @ <tspan class="cyan">CurlScape Solutions</tspan>
    <tspan class="dim"> · </tspan>
    Pune, India
    <tspan class="dim"> · </tspan>
    B.Tech IT @ Bharati Vidyapeeth (CGPA 9.6)
  </text>

  <!-- trailing prompt with blinking cursor -->
  <text x="40" y="288" class="mono prompt" font-size="20" filter="url(#softGlow)">❯</text>
  <rect x="68" y="272" width="11" height="22" fill="#22C55E" class="caret">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.06s" keyTimes="0;0.5;0.5001;1" repeatCount="indefinite"/>
  </rect>

  <!-- footer-right URL -->
  <text x="1160" y="296" class="mono dim" font-size="12" text-anchor="end" letter-spacing="0.08em">
    ↗ jainamoswal.xyz
  </text>
</svg>
